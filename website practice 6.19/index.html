<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Practice 6.19</title>
  <style>
    :root {
      --text: #ffffff;
      --font-main: "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --glass: rgba(255, 255, 255, 0.14);
      --glass-border: rgba(255, 255, 255, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: var(--font-main);
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 34%),
        linear-gradient(180deg, #c7beb4 0%, #b8aea2 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .screen.is-active {
      opacity: 1;
      pointer-events: auto;
      z-index: 1;
    }

    .stage {
      position: relative;
      width: min(calc(100vw - 48px), calc((100vh - 48px) * 1728 / 1117));
      aspect-ratio: 1728 / 1117;
      max-height: calc(100vh - 48px);
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.16);
      background: #bfb7ad;
    }

    .artwork,
    .overlay,
    .back-hit {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .artwork {
      object-fit: contain;
      object-position: center center;
      user-select: none;
      -webkit-user-drag: none;
    }

    .overlay {
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(24, 18, 12, 0.12) 0%, rgba(24, 18, 12, 0.03) 24%, rgba(24, 18, 12, 0) 44%),
        linear-gradient(90deg, rgba(8, 8, 8, 0.08) 0%, rgba(8, 8, 8, 0) 22%, rgba(8, 8, 8, 0) 78%, rgba(8, 8, 8, 0.08) 100%);
    }

    .hotspots {
      position: absolute;
      inset: 0;
    }

    .hotspot {
      position: absolute;
      display: block;
      border-radius: 24px;
      outline: none;
      transition: background-color 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
    }

    .hotspot:hover,
    .hotspot:focus-visible {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      opacity: 0.95;
    }

    .chair {
      left: 3.59%;
      top: 31.78%;
      width: 20.83%;
      height: 32.05%;
    }

    .headphone {
      left: 29.75%;
      top: 33.84%;
      width: 15.39%;
      height: 17.01%;
    }

    .clipper {
      left: 54.69%;
      top: 34.29%;
      width: 12.38%;
      height: 16.56%;
    }

    .generator {
      left: 78.70%;
      top: 31.78%;
      width: 17.59%;
      height: 45.93%;
    }

    .mobile-links {
      display: none;
    }

    .mobile-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
      font-size: 14px;
      line-height: 1;
      transition: transform 180ms ease, opacity 180ms ease, background-color 180ms ease;
    }

    .mobile-links a.is-current {
      background: rgba(255, 255, 255, 0.26);
      font-weight: 600;
    }

    .mobile-links a:hover,
    .mobile-links a:focus-visible {
      opacity: 0.78;
      transform: translateY(-1px);
    }

    .back-hit {
      display: block;
      z-index: 2;
      outline: none;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .screen {
        padding: 12px 12px 112px;
      }

      .stage {
        width: 100%;
        max-height: calc(100vh - 124px);
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.14);
      }

      .artwork {
        object-fit: cover;
        object-position: 68% center;
      }

      .overlay {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.30) 0%, rgba(0, 0, 0, 0.1) 28%, rgba(0, 0, 0, 0.24) 100%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.32) 0%, rgba(0, 0, 0, 0.08) 55%, rgba(0, 0, 0, 0) 100%);
      }

      .hotspots {
        display: none;
      }

      .mobile-links {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: max(16px, env(safe-area-inset-bottom));
        z-index: 2;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .mobile-links a {
        padding: 15px 12px;
        text-align: center;
        font-size: 15px;
        line-height: 1.2;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="screen screen-home" data-screen="home" aria-label="Homepage">
      <div class="stage">
        <img class="artwork" src="./src/assets/page4-homepage.png" alt="Letong Wang portfolio homepage" />
        <div class="overlay"></div>

        <div class="hotspots" aria-label="Project links">
          <a class="hotspot chair" href="#chair" aria-label="Clothes-drying chair"></a>
          <a class="hotspot headphone" href="#headphone" aria-label="0 Plastic Headphone"></a>
          <a class="hotspot clipper" href="#clipper" aria-label="Accessibility Nail Clipper"></a>
          <a class="hotspot generator" href="#generator" aria-label="Visual Effect Generator"></a>
        </div>
      </div>

      <nav class="mobile-links" aria-label="Project links mobile">
        <a href="#chair" data-link="chair">Clothes-Drying Chair</a>
        <a href="#headphone" data-link="headphone">0 Plastic Headphone</a>
        <a href="#clipper" data-link="clipper">Accessibility+ Nail Clipper</a>
        <a href="#generator" data-link="generator">Visual Effect Generator</a>
      </nav>
    </section>

    <section class="screen" data-screen="chair" aria-label="Chair project page">
      <div class="stage">
        <img class="artwork" src="./src/assets/page4-chair.png" alt="Clothes-drying chair project page" />
        <a class="back-hit" href="#home" aria-label="Go back to homepage"></a>
      </div>
    </section>

    <section class="screen" data-screen="headphone" aria-label="Headphone project page">
      <div class="stage">
        <img class="artwork" src="./src/assets/page4-headphone.png" alt="0 Plastic Headphone project page" />
        <a class="back-hit" href="#home" aria-label="Go back to homepage"></a>
      </div>
    </section>

    <section class="screen" data-screen="clipper" aria-label="Clipper project page">
      <div class="stage">
        <img class="artwork" src="./src/assets/page4-clipper.png" alt="Accessibility Nail Clipper project page" />
        <a class="back-hit" href="#home" aria-label="Go back to homepage"></a>
      </div>
    </section>

    <section class="screen" data-screen="generator" aria-label="Generator project page">
      <div class="stage">
        <img class="artwork" src="./src/assets/page4-generator.png" alt="Visual Effect Generator project page" />
        <a class="back-hit" href="#home" aria-label="Go back to homepage"></a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var projects = { chair: true, headphone: true, clipper: true, generator: true };

      var screens = document.querySelectorAll('.screen');
      var links = document.querySelectorAll('[data-link]');

      function currentScreen() {
        var hash = window.location.hash.replace(/^#/, '');
        if (hash && projects[hash]) {
          return hash;
        }
        return 'home';
      }

      function render() {
        var current = currentScreen();

        for (var i = 0; i < screens.length; i += 1) {
          screens[i].classList.toggle('is-active', screens[i].getAttribute('data-screen') === current);
        }

        for (var j = 0; j < links.length; j += 1) {
          links[j].classList.toggle('is-current', links[j].getAttribute('data-link') === current);
        }

        if (current !== 'home') {
          document.title = 'Website Practice 6.19';
        } else {
          document.title = 'Website Practice 6.19';
        }
      }

      window.addEventListener('hashchange', render);
      render();
    }());
  </script>
</body>
</html>
